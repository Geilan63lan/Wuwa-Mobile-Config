[SystemSettings]

; =====================================================
; WUTHERING WAVES 3.4
; SNAPDRAGON - HIGH END
; Target:
; Adreno 750 / 830
; Snapdragon 8 Gen 3 / 8 Elite
; Goal: Maximum Visual Quality
; =====================================================

; ---------------------
; RESOLUTION
; ---------------------

r.ScreenPercentage=100

; Snapdragon-exclusive scale factor
r.MobileContentScaleFactor=2.0

; ---------------------
; SNAPDRAGON SUPER RESOLUTION
; ---------------------

r.GSR.Enabled=1

; ---------------------
; KURO FRAME INTERPOLATION
; ---------------------

r.KuroFI.Enable=1

; ---------------------
; KURO STREAMING
; ---------------------

r.Streaming.UsingNewKuroStreaming=1
r.Streaming.UsingKuroStreamingPriority=3

r.Streaming.PoolSize=1536
r.Streaming.MipBias=0

r.Streaming.MaxNumTexturesToStreamPerFrame=6
r.Streaming.FramesForFullUpdate=1

; ---------------------
; ADRENO STREAMING TUNING
; ---------------------

r.Streaming.DefragDynamicBounds=1
r.Streaming.AmortizeCPUToGPUCopy=1

; ---------------------
; VIEW DISTANCE
; ---------------------

r.ViewDistanceScale=2.0

; Maximum distant detail
r.StaticMeshLODDistanceScale=0.5

r.ScreenSizeCullRatioFactor=1

r.SkeletalMeshLODBias=0

; ---------------------
; SHADOWS
; ---------------------

r.ShadowQuality=3

r.Shadow.DistanceScale=2.0

r.Shadow.MaxResolution=2048
r.Shadow.MinResolution=2048

r.Shadow.PerObjectShadowMapResolution=2048

r.Shadow.PerObjectResolutionMax=2048
r.Shadow.PerObjectResolutionMin=1024

r.Shadow.CSM.MaxCascades=4

; ---------------------
; FOLIAGE
; ---------------------

foliage.DensityScale=2.0
grass.CullDistanceScale=2.0

foliage.DensityScaleLOD.DrawCallOptimize=1

; ---------------------
; CLOUDS
; ---------------------

r.KuroVolumeCloudEnable=1

; ---------------------
; REFLECTIONS
; ---------------------

r.SSR.Quality=3

; ---------------------
; POST PROCESSING
; ---------------------

r.SceneColorFringeQuality=1

r.BloomQuality=5

r.LensFlareQuality=2

r.EyeAdaptationQuality=2

r.MotionBlurQuality=2

r.Tonemapper.Quality=5

; ---------------------
; AMBIENT OCCLUSION
; ---------------------

r.AmbientOcclusionLevels=3
r.AmbientOcclusionMaxQuality=100

; ---------------------
; EFFECTS
; ---------------------

fx.Niagara.QualityLevel=3
fx.Niagara.GlobalSpawnCountScale=1.5

r.Kuro.InteractionEffect.EnableBushInteractionEffect=1
r.Kuro.InteractionEffect.EnableFoliageEffect=1
r.Kuro.InteractionEffect.UseCppWaterEffect=1

; ---------------------
; VARIABLE RATE SHADING
; ---------------------

r.VRS.EnableMaterial=true
r.VRS.EnableMesh=true

; ---------------------
; VULKAN OPTIMIZATIONS
; ---------------------

r.PSO.LRUCapacity=16384

; ---------------------
; WORLD PARTITION
; ---------------------

wp.Runtime.PlannedLoadingRangeScale=1.2

; ---------------------
; ANISOTROPIC FILTERING
; ---------------------

r.MaxAnisotropy=16

