[SystemSettings]

; =====================================================
; WUTHERING WAVES 3.4
; SNAPDRAGON - BALANCED PERFORMANCE
; Target:
; Adreno 618 / 620 / 642
; Snapdragon 720G / 778G
; Goal: Stable 45 FPS
; =====================================================

; ---------------------
; RESOLUTION
; ---------------------

r.ScreenPercentage=85
r.MobileContentScaleFactor=1.0

; ---------------------
; SNAPDRAGON SUPER RESOLUTION
; ---------------------

r.GSR.Enabled=1

; ---------------------
; KURO STREAMING
; ---------------------

r.Streaming.UsingNewKuroStreaming=1
r.Streaming.UsingKuroStreamingPriority=3

r.Streaming.PoolSize=768
r.Streaming.MipBias=4

r.Streaming.MaxNumTexturesToStreamPerFrame=3
r.Streaming.FramesForFullUpdate=3

; ---------------------
; ADRENO STREAMING TUNING
; ---------------------

r.Streaming.DefragDynamicBounds=1
r.Streaming.AmortizeCPUToGPUCopy=1

; ---------------------
; VIEW DISTANCE
; ---------------------

r.ViewDistanceScale=1.0
r.StaticMeshLODDistanceScale=0.9

r.ScreenSizeCullRatioFactor=6

r.SkeletalMeshLODBias=0

; ---------------------
; SHADOWS
; ---------------------

r.ShadowQuality=1

r.Shadow.DistanceScale=1.0

r.Shadow.MaxResolution=512
r.Shadow.MinResolution=512

r.Shadow.PerObjectResolutionMax=512
r.Shadow.PerObjectResolutionMin=256

r.Shadow.CSM.MaxCascades=2

; ---------------------
; FOLIAGE
; ---------------------

foliage.DensityScale=0.8
grass.CullDistanceScale=0.8

; ---------------------
; REFLECTIONS
; ---------------------

r.SSR.Quality=1

; ---------------------
; CLOUDS
; ---------------------

r.KuroVolumeCloudEnable=1

; ---------------------
; POST PROCESSING
; ---------------------

r.SceneColorFringeQuality=0
r.BloomQuality=1
r.LensFlareQuality=0

r.EyeAdaptationQuality=1
r.MotionBlurQuality=0

r.Tonemapper.Quality=2

; ---------------------
; AMBIENT OCCLUSION
; ---------------------

r.AmbientOcclusionLevels=1
r.AmbientOcclusionMaxQuality=30

; ---------------------
; EFFECTS
; ---------------------

fx.Niagara.QualityLevel=1
fx.Niagara.GlobalSpawnCountScale=1.0

; ---------------------
; KURO FRAME INTERPOLATION
; ---------------------

r.KuroFI.Enable=1

; ---------------------
; VULKAN OPTIMIZATIONS
; ---------------------

r.PSO.LRUCapacity=4096

; ---------------------
; WORLD PARTITION
; ---------------------

wp.Runtime.PlannedLoadingRangeScale=0.6

; ---------------------
; ANISOTROPIC FILTERING
; ---------------------

r.MaxAnisotropy=4

