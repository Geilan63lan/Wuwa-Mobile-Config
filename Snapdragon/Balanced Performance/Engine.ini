[/Script/Engine.RendererSettings]

; ---- DEVICE PROFILE OVERRIDE ----
; Targets Adreno 7xx / 8xx (SD 778G~8 Gen 3)
; Performance-biased: keeps visual features but dials back heavy costs
dp.override=Android_Adreno7xx
dp.override=Android_Adreno8xx

; ---- RENDER SCALE ----
r.MobileContentScaleFactor=1.0
r.SecondaryScreenPercentage.GameViewport=100

; ---- STREAMING / TEXTURES ----
; Slightly boosted from base for cleaner textures without VRAM risk
r.Streaming.MinBoost=2.0
r.MipMapLODBias=-1

; ---- VIEW DISTANCE ----
r.ViewDistanceScale=3

; ---- LOD / MESH QUALITY ----
; Moderate — not as aggressive as Low End, keeps decent mid-distance detail
r.StaticMeshLODDistanceScale=0.5
r.DetailMode=1

; ---- MATERIAL QUALITY ----
r.MaterialQualityLevel=2
r.KuroMaterialQualityLevel=2
r.Mobile.HighQualityMaterial=1

; ---- SHADOWS ----
; Reduced from base but still usable quality
r.ShadowQuality=3
r.Shadow.RadiusThreshold=0.03
r.Shadow.MaxCSMResolution=1024
r.Shadow.MinResolution=1024
r.Shadow.PerObjectShadowMapResolution=1024
r.Shadow.PerObjectResolutionMax=1024
r.Shadow.PerObjectResolutionMin=1024
r.ContactShadows=0

; ---- AMBIENT OCCLUSION ----
; GTAO at reduced quality - keeps grounding without full cost
r.AmbientOcclusionMaxQuality=50
r.Mobile.GTAO.Quality=1

; ---- REFLECTIONS ----
; SSR on at low quality, half res off for cleaner result
r.SSR.HalfResSceneColor=0
r.Mobile.WaterSSRResDiv=1.0
r.Mobile.WaterSSRStep=32
r.Mobile.EnableLandscapeSSR=0
r.Mobile.SSRLowPrecisionDepth=0

; ---- UPSCALING ----
; SGSR2 enabled - Snapdragon's native upscaler, great perf/quality ratio
r.SGSR2.Enabled=1
r.SGSR2.History=1
r.SGSR2.Quality=2
r.SGSR2.5Sample=1
r.TemporalAA.MobileUpsampling=1
r.TemporalAA.MobileStaticFrameWeight=0.15
r.TemporalAA.MobileFrameWeight=0.15
; FSR secondary upscale kept for texture sharpness
r.FidelityFX.FSR.SecondaryUpscale=1
r.FidelityFX.FSR.RCAS.Sharpness=1.0

; ---- BLOOM ----
; Trimmed bloom stack - keep basic bloom, cut expensive convolution
r.Kuro.KuroBloomStreak=0
r.BloomQuality=3
r.Bloom.Fast=1
r.Bloom.Cross=0
r.Bloom.MobileBetter=1
r.Bloom.Intensity=1.2
r.Bloom.Threshold=-1
r.Bloom.DirtMask=0
r.Bloom.SizeScale=1.0
r.Bloom.TonemapScale=1.0
r.Bloom.Convolution=0

; ---- POST PROCESSING ----
r.SceneColorFringeQuality=0
r.Tonemapper.Quality=1
r.DepthOfFieldQuality=0
r.KuroLightShaft=1
r.MobileLightShaft=1
r.MobileLightShaft.AllowTAA=1
r.MobileLightShaft.BloomScale=0.8
r.MobileLightShaft.DownSampleFactor=2
r.MobileLightShaft.LocalLightShaftBufferZone=1.0
r.MobileLightShaft.LocalLightShaftNearClip=1.0
r.MobileLightShaft.NumSamples=16
r.MobileLightShaft.UseLocalLightShaft=1
r.LightShaftQuality=1
r.Mobile.MobileLightShaft.DownSampleFactor=2
r.DefaultBackBufferPixelFormat=0
r.Kuro.AutoExposure=1

; ---- FOLIAGE ----
; Some foliage kept - reduced density and distance vs base
r.foliage.LODDistanceScale=2
r.foliage.DensityType=1
r.GrassLODDistanceScale=3.0
r.Kuro.Foliage.GrassCullDistanceMax=15000

; ---- FOG / ATMOSPHERE ----
; Volumetric fog off (heavy), regular fog on
r.Fog=1
r.VolumetricFog=0
r.VolumetricCloud=0
r.VolumetricRenderTarget=0
r.Cloud.SkyAO=0
r.SkyAtmosphere=1
r.SkyAtmosphere.AerialPerspectiveLUTFastApplyOnOpaque=1
r.SkyAtmosphere.MultiScattering=0
r.SkyLightingQuality=1
r.KuroVolumeCloudEnable=0
r.FogDensity=0.01
r.FogHeightFalloff=0.01

; ---- MATERIALS / SURFACE ----
r.ClearCoatNormal=0
r.AnisotropicMaterials=0
r.SkylightIntensityMultiplier=0.8
r.Mobile.HighQualitySkyCaptureFiltering=1
r.KuroMobile.LensFlareQuality=1
Kuro.InteractiveLeavesForceMobilePreview=1

; ---- HISM BATCHER ----
HISMBatcher.Enabled=1
HISMBatcher.MaxPoolSize=256

; ---- COLOR GRADING ----
r.Color.Max=1.6
r.Color.Mid=0.567
r.Color.Min=0.0001

; ---- VULKAN STABILITY (Android / Snapdragon specific) ----
r.Vulkan.RobustBufferAccess=0
r.Vulkan.DescriptorSetLayoutMode=0

; ---- THERMAL MANAGEMENT ----
; Disabled by default for performance - enable if device runs hot
r.Kuro.AutoCoolEnable=0

; ---- FRAME GENERATION (AFME) ----
r.FrameGeneration.Enable=1
r.AFME.Enable=1
r.AFME.Kuro.Enable=1

; ---- MOBILE DEVICE EVALUATION ----
r.Mobile.DeviceEvaluation=3