; --- 3.3 ASSET STREAMING & MEMORY ---
r.Streaming.UsingNewKuroStreaming=1
r.streaming.TexturePoolSizeMode=1
r.Streaming.PoolSize=1000
r.Streaming.LimitPoolSizeToVRAM=0
r.streaming.QualityExtraLODBiasSetting=0
r.Streaming.MipBias=0

; --- SHADOWS ---
r.ShadowQuality=3
r.Shadow.RadiusThreshold=0.03
r.Shadow.MaxCSMResolution=1024
r.Shadow.MinResolution=1024
r.Shadow.PerObjectShadowMapResolution=1024

; --- BALANCED ANNIVERSARY OPTIMIZATION ---
r.Kuro.Foliage.EnableFoliageCulling=1
r.foliage.LODDistanceScale=2
r.GrassLODDistanceScale=3.0
foliage.LODOptimize=1

; --- 3.3 BATCHING SYSTEMS ---
HISMBatcher.Enabled=1
r.BBM.EnableBatcher=1
r.BBM.LODBias=1

; --- POST PROCESSING & BLOOM ---
r.Tonemapper.Quality=1
r.BloomQuality=3
r.Bloom.MobileBetter=1
r.DepthOfFieldQuality=0
r.Fog=1

