[/Script/Engine.RendererSettings]
 
; ---- DEVICE PROFILE OVERRIDE ----
; Targets Adreno 5xx / Adreno 6xx Low tiers
dp.override=Android_Adreno5xx_Low
dp.override=Android_Adreno6xx_Low
dp.override=Android_Adreno6xx_Lowest
 
; ---- RENDER SCALE ----
; Full native render - do NOT reduce, mobile upscaling artifacts are bad
r.MobileContentScaleFactor=1.0
r.SecondaryScreenPercentage.GameViewport=100
 
; ---- LOD / MESH QUALITY ----
; Very aggressive LOD bias to reduce polygon load at distance
r.StaticMeshLODDistanceScale=0.1
r.DetailMode=0
r.LandscapeLODBias=1
 
; ---- MATERIAL QUALITY ----
; 1 = High, 2 = Medium (numbers are inverted by Kuro)
r.MaterialQualityLevel=1
r.KuroMaterialQualityLevel=1
 
; ---- SHADOWS ----
; Reduced shadow resolution and increased radius threshold = fewer/cheaper shadows
r.Shadow.RadiusThreshold=0.06
r.Shadow.MaxCSMResolution=128
r.Shadow.MinResolution=128
r.Shadow.PerObjectShadowMapResolution=128
r.Shadow.PerObjectResolutionMax=128
r.Shadow.PerObjectResolutionMin=128
r.Shadow.DistanceScale=0.6
r.Shadow.ForbidHISMShadowStartIndex=0
 
; ---- AMBIENT OCCLUSION ----
; Disable AO - significant GPU cost on low-end
r.AmbientOcclusionMaxQuality=0
 
; ---- REFLECTIONS ----
; SSR off - too expensive for low-end Adreno
r.SSR.Quality=0
 
; ---- POST PROCESSING ----
; Disable chromatic aberration
r.SceneColorFringeQuality=0
; Disable vignette and film grain only (keep film contrast)
r.Tonemapper.Quality=1
; Disable bloom streak
r.Kuro.KuroBloomStreak=0
; Disable lens flare
r.EnableLensflareSceneSample=0
; Disable depth of field
r.DepthOfFieldQuality=0
; Disable FFT Bloom (used in Lahai-Roi, expensive)
r.Kuro.KuroEnableFFTBloom=0
 
; ---- FOG / CLOUDS ----
; Disable both fog and volume clouds for performance
r.Fog=0
r.KuroVolumeCloudEnable=0
; Disable Screen Space Fog Scattering
r.SSFS=0
 
; ---- FOLIAGE ----
; No foliage density on low-end
foliage.DensityScale=0
foliage.DensityType=0
 
; ---- PARTICLES ----
; Reduce max CPU particles and add LOD bias
fx.MaxNiagaraCPUParticlesPerEmitter=64
r.ParticleLODBias=1
; Reduce niagara tick frequency (less CPU overhead)
fx.NiagaraKuroTickUpdateTime=0.5
 
; ---- STREAMING / TEXTURES ----
; High mip bias = load lower res textures = less VRAM and streaming pressure
r.Streaming.MipBias=16
r.Streaming.MinBoost=1.0
 
; ---- WORLD PARTITION LOADING RANGES ----
; Kept from your game's base 3.2 Engine.ini
wp.Runtime.OverrideMultipleRuntimeGridLoadingRangeValues=50&80&180&100&450&1500&150&200&300&150&200&300&480&250&50&80&100&150&40&80&100&100&300&1500&50&80&100&450&600
 
; ---- WATER / INTERACTION ----
; Disable water ripple effect (CPU cost)
r.Kuro.InteractionEffect.UseCppWaterEffect=0
 
; ---- ANIMATION ----
; Default URO (Update Rate Optimization) - let engine reduce anim updates automatically
a.URO.Enable=0
 
; ---- HISM BATCHER ----
; Keep enabled for instanced mesh batching efficiency
HISMBatcher.Enabled=1
HISMBatcher.MaxPoolSize=256
 
; ---- COLOR GRADING ----
; Kept from your game's base 3.2 Engine.ini
r.Color.Max=1.7
r.Color.Mid=0.432
r.Color.Min=0.0001
 
; ---- VULKAN STABILITY (Android-specific) ----
; May improve Vulkan stability and reduce crashes on older Adreno drivers
r.Vulkan.RobustBufferAccess=0
r.Vulkan.DescriptorSetLayoutMode=0
 
; ---- THERMAL MANAGEMENT (Android-specific) ----
; Throttles to 30 FPS when CPU temp exceeds 65°C - prevents thermal shutdown
r.Kuro.AutoCoolEnable=1
 
; ---- AFME (Kuro Frame Interpolation) ----
; Keep AFME enabled - provides smoother frames on low-end without much GPU overhead
r.FrameGeneration.Enable=1
r.AFME.Enable=1
r.AFME.Kuro.Enable=1
 
; ---- MOBILE DEVICE EVALUATION ----
r.Mobile.DeviceEvaluation=3