[SystemSettings]

; =====================================================
; WUTHERING WAVES 3.4
; SNAPDRAGON - BALANCED VISUAL
; Target:
; Adreno 730 / 740
; Snapdragon 8 Gen 1 / 8 Gen 2
; Goal: High Visual Quality
; =====================================================

; ---------------------
; RESOLUTION
; ---------------------

r.ScreenPercentage=100
r.MobileContentScaleFactor=1.5

; ---------------------
; SNAPDRAGON SUPER RESOLUTION
; ---------------------

r.GSR.Enabled=1

; ---------------------
; KURO FRAME INTERPOLATION
; ---------------------

r.KuroFI.Enable=1

; ---------------------
; KURO STREAMING
; ---------------------

r.Streaming.UsingNewKuroStreaming=1
r.Streaming.UsingKuroStreamingPriority=3

r.Streaming.PoolSize=1024
r.Streaming.MipBias=1

r.Streaming.MaxNumTexturesToStreamPerFrame=4
r.Streaming.FramesForFullUpdate=2

; ---------------------
; ADRENO STREAMING TUNING
; ---------------------

r.Streaming.DefragDynamicBounds=1
r.Streaming.AmortizeCPUToGPUCopy=1

; ---------------------
; VIEW DISTANCE
; ---------------------

r.ViewDistanceScale=1.2

r.StaticMeshLODDistanceScale=0.7

r.ScreenSizeCullRatioFactor=3

r.SkeletalMeshLODBias=0

; ---------------------
; SHADOWS
; ---------------------

r.ShadowQuality=2

r.Shadow.DistanceScale=1.2

r.Shadow.MaxResolution=1024
r.Shadow.MinResolution=1024

r.Shadow.PerObjectShadowMapResolution=1024

r.Shadow.PerObjectResolutionMax=1024
r.Shadow.PerObjectResolutionMin=512

r.Shadow.CSM.MaxCascades=2

; ---------------------
; FOLIAGE
; ---------------------

foliage.DensityScale=1.2
grass.CullDistanceScale=1.2

foliage.DensityScaleLOD.DrawCallOptimize=1

; ---------------------
; CLOUDS
; ---------------------

r.KuroVolumeCloudEnable=1

; ---------------------
; REFLECTIONS
; ---------------------

r.SSR.Quality=2

; ---------------------
; POST PROCESSING
; ---------------------

r.SceneColorFringeQuality=0

r.BloomQuality=2

r.LensFlareQuality=1

r.EyeAdaptationQuality=2

r.MotionBlurQuality=0

r.Tonemapper.Quality=4

; ---------------------
; AMBIENT OCCLUSION
; ---------------------

r.AmbientOcclusionLevels=2
r.AmbientOcclusionMaxQuality=50

; ---------------------
; EFFECTS
; ---------------------

fx.Niagara.QualityLevel=2
fx.Niagara.GlobalSpawnCountScale=1.2

r.Kuro.InteractionEffect.EnableBushInteractionEffect=1
r.Kuro.InteractionEffect.EnableFoliageEffect=1

; ---------------------
; VARIABLE RATE SHADING
; ---------------------

r.VRS.EnableMaterial=true
r.VRS.EnableMesh=true

; ---------------------
; VULKAN OPTIMIZATIONS
; ---------------------

r.PSO.LRUCapacity=8192

; ---------------------
; WORLD PARTITION
; ---------------------

wp.Runtime.PlannedLoadingRangeScale=0.8

; ---------------------
; ANISOTROPIC FILTERING
; ---------------------

r.MaxAnisotropy=8

