[/Script/Engine.RendererSettings]
; --- 3.3 ASSET STREAMING (High Stability) ---
r.Streaming.UsingNewKuroStreaming=1
r.streaming.TexturePoolSizeMode=1
r.Streaming.PoolSize=1024
r.Streaming.LimitPoolSizeToVRAM=0
r.streaming.QualityExtraLODBiasSetting=0
r.Streaming.MipBias=0

; --- HIGH-END SHADOWS ---
r.ShadowQuality=5
r.Shadow.RadiusThreshold=0.01
r.Shadow.MaxCSMResolution=2048
r.Shadow.MinResolution=2048
r.ContactShadows=1

; --- VISUAL ENHANCEMENTS ---
r.BloomQuality=5
r.Bloom.Convolution=1
r.Fog=1
r.VolumetricFog=1
r.VolumetricCloud=1
r.AmbientOcclusionMaxQuality=100
r.Mobile.GTAO.Quality=3

; --- FOLIAGE & ENVIRONMENT ---
r.foliage.LODDistanceScale=3
r.GrassLODDistanceScale=5.0
r.Kuro.Foliage.EnableFoliageCulling=1
foliage.DensityScale=4

; --- 3.3 BATCHING SYSTEMS ---
HISMBatcher.Enabled=1
r.BBM.EnableBatcher=1
r.BBM.LODBias=0

; --- SNAPDRAGON SUPER RESOLUTION ---
[/Script/GSRTUModule.GSRSettings]
bEnableGSR=1
fSharpness=0.8

[SystemSettings]
; Advanced TAA Upsampling
r.TemporalAA.MobileUpsampling=1
r.TemporalAA.Quality=4
r.FidelityFX.FSR.Enabled=True
r.FidelityFX.FSR.RCAS.Enabled=1
r.FidelityFX.FSR.RCAS.Sharpness=0.8