[/Script/Engine.RendererSettings]

; ---- DEVICE PROFILE OVERRIDE ----
dp.override=Android_Adreno7xx
dp.override=Android_Adreno8xx

; ---- VULKAN ----
r.Android.DisableVulkanSupport=0

; ---- SHADOWS ----
r.ShadowQuality=5
r.Shadow.RadiusThreshold=0.01
r.Shadow.MaxCSMResolution=2048
r.Shadow.MinResolution=2048
r.Shadow.PerObjectShadowMapResolution=2048
r.Shadow.PerObjectResolutionMax=2048
r.Shadow.PerObjectResolutionMin=2048
r.ContactShadows=1

; ---- AMBIENT OCCLUSION ----
r.AmbientOcclusionMaxQuality=100
r.Mobile.GTAO.Quality=3

; ---- REFLECTIONS ----
r.SSR.HalfResSceneColor=0
r.SSR.Temporal=1
r.SSR.MaxRoughness=0.5
r.Mobile.WaterSSRResDiv=1.0
r.Mobile.WaterSSRStep=128
r.Mobile.EnableLandscapeSSR=0
r.Mobile.SSRLowPrecisionDepth=0
r.ReflectionCaptureResolution=256
r.Water.SingleLayer.SSR=0

; ---- UPSCALING / TAA ----
r.TemporalAA.MobileUpsampling=1
r.TemporalAA.MobileStaticFrameWeight=0.15
r.TemporalAA.MobileFrameWeight=0.15
r.TemporalAASharpen=0.5
r.TemporalAA.Algorithm=1
r.TemporalAA.HistoryScreenPercentage=190
r.TemporalAA.Quality=4
r.TemporalAASamples=2
r.TemporalAAFilterSize=0.15
r.TemporalAA.Sharpness=0.2
r.TemporalAA.MobileUseCompute=1
r.TemporalAA.SharpenLimitDepth=2.0
r.TemporalAA.SharpenValueMin=0.01
r.TemporalAA.MobileCatmullRom=1
r.TemporalAA.MobileGatherDepth=1
r.TemporalAA.FilterSize=0.1
r.TemporalAA.PauseCorrect=1
r.FidelityFX.FSR.Enabled=True
r.FidelityFX.FSR.SecondaryUpscale=1
r.FidelityFX.FSR.RCAS.Enabled=1
r.FidelityFX.FSR.RCAS.Sharpness=1.0
r.FidelityFX.FSR.MipBias.Method=2
r.FidelityFX.FSR.MipBias.Offset=-2

; ---- BLOOM ----
r.Kuro.KuroBloomStreak=0
r.BloomQuality=5
r.Bloom.Fast=0
r.Bloom.Cross=1
r.Bloom.MobileBetter=1
r.Bloom.Intensity=1.5
r.Bloom.Threshold=-1
r.Bloom.DirtMask=1
r.Bloom.DirtMaskIntensity=1.0
r.Bloom.SizeScale=1.0
r.Bloom.TonemapScale=1.0
r.Bloom.Convolution=1
r.Bloom.ConvolutionKernelSize=5

; ---- POST PROCESSING ----
r.SceneColorFringeQuality=1
r.Tonemapper.Quality=1
r.DepthOfFieldQuality=0
r.MobileLightShaft=1
r.MobileLightShaft.AllowTAA=2
r.MobileLightShaft.BloomScale=0.8
r.MobileLightShaft.DownSampleFactor=1
r.MobileLightShaft.LocalLightShaftBufferZone=1.0
r.MobileLightShaft.LocalLightShaftNearClip=1.0
r.MobileLightShaft.NumSamples=32
r.MobileLightShaft.UseLocalLightShaft=1
r.LightShaftQuality=2
r.DefaultBackBufferPixelFormat=0
r.Kuro.AutoExposure=1
r.KuroMobile.LensFlareQuality=3

; ---- FOLIAGE ----
r.foliage.LODDistanceScale=3
r.foliage.DensityType=2
r.GrassLODDistanceScale=5.0
r.Kuro.Foliage.GrassCullDistanceMax=30000
foliage.DensityScale=4

; ---- FOG / ATMOSPHERE ----
r.Fog=1
r.VolumetricFog=1
r.VolumetricCloud=1
r.VolumetricRenderTarget=1
r.Cloud.SkyAO=1
r.SkyAtmosphere=1
r.SkyAtmosphere.AerialPerspectiveLUTFastApplyOnOpaque=1
r.SkyAtmosphere.MultiScattering=1
r.SkyLightingQuality=1
r.FogDensity=0.01
r.FogHeightFalloff=0.01

; ---- MATERIALS / SURFACE ----
r.Mobile.HighQualityMaterial=1
r.ClearCoatNormal=0
r.AnisotropicMaterials=1
r.SkylightIntensityMultiplier=0.8
r.Mobile.HighQualitySkyCaptureFiltering=1
r.TessellationAdaptivePixelsPerTriangle=60.0
Kuro.InteractiveLeavesForceMobilePreview=1

; ---- VULKAN STABILITY (Snapdragon-specific) ----
r.Vulkan.RobustBufferAccess=0
r.Vulkan.AllowPresentOnComputeQueue=1
r.Vulkan.AllowUniformUpload=1
r.Vulkan.InputAttachmentShaderRead=1

; ---- COLOR GRADING ----
r.Color.Max=1.1
r.Color.Mid=0.564
r.Color.Min=0.0001

; ---- THERMAL MANAGEMENT ----
r.Kuro.AutoCoolEnable=0

; ---- MOBILE DEVICE EVALUATION ----
r.Mobile.DeviceEvaluation=3

[/Script/Engine.RendererOverrideSettings]

; ---- DRAW COMMANDS / INSTANCING ----
r.MeshDrawCommands.DynamicInstancing=0
r.MeshDrawCommands.MobileBasePassDrawcallLimit=7000
r.MeshDrawCommands.ShadowPerBatchDrawcallMax=512
r.MeshDrawCommands.AllowOnDemandShaderCreation=1
r.MeshDrawCommands.BasePassDrawcallLimitMethod=1
r.MeshDrawCommands.UseCachedCommands=1
r.MeshDrawCommands.ParallelPassSetup=1

; ---- SHADOWS (OverrideSettings) ----
r.Mobile.EnableKuroSpotlightsShadow=1
r.Shadow.CSM0Distance=900
r.Shadow.CSM1Distance=1600
r.Shadow.CSM2Distance=2000
r.Shadow.CSM3Distance=2700
r.Shadow.CSM.MaxCascades=3
r.Shadow.AllShadowDrawcallMax=512

; ---- LOD / CULLING ----
r.SkeletalMeshLODBias=-1
r.LandscapeLODBias=-1
r.ViewDistanceQuality=3
r.Kuro.LODDistanceScale=1.0
r.Kuro.SkeletalMesh.LODDistanceScale=1.0
r.Kuro.SkeletalMesh.LODScreenSizeScale=1.0
lod.TemporalLag=1
r.ScreenSizeCullRatioFactor=0.9
r.Kuro.MobileISMDecideDistance=3000
r.Kuro.MobileISMMeshRadiusMax=18000
r.Landscape.KuroLOD0Distance=10000

; ---- FOLIAGE CULLING ----
r.Kuro.Foliage.MobileNearCullDistanceMax=2000
r.Kuro.Foliage.MobileMiddleCullDistanceMax=2000
r.Kuro.Foliage.MobileGrassCullDistanceMax=3500

; ---- STREAMING (OverrideSettings) ----
r.Streaming.Boost=1.0
r.Streaming.PoolSize=512
r.Streaming.AllowParallelStreamingRenderAssets=1
r.Streaming.UseBackgroundThreadPool=1
r.Streaming.UseAllMips=1
wp.Runtime.KuroRuntimeStreamingRangeOverallScale=1.5

; ---- ANIMATION ----
a.URO.ForceAnimRate=2

; ---- RENDERING FEATURES ----
r.Mobile.DisableVertexFog=0
r.Mobile.DisableLocalLightSpecularDistance=50000
r.Mobile.TreeRimLight=1
r.MinRoughnessOverride=1.0
r.RenderTargetPoolMin=512
r.SkinCache.SceneMemoryLimitInMB=255
r.DefaultFeature.MotionBlur=1
r.EmitterSpawnRateScale=0.5
r.Kuro.FlickerLightActorTickFactor=3.0
r.Kuro.ToonOutlineDrawDistanceMobile=400
r.Kuro.ToonEyeTransparentDrawDistanceMobile=100
r.Kuro.ToonFaceShadowMeshDrawDistanceMobile=100

; ---- MISC ----
r.VSync=0
grass.DiscardDataOnLoad=0
HISMBatcher.MaxPoolSize=512
wp.Runtime.GridBlackList=None
wp.Runtime.SoraGridBlackListHeight=10000000

; NOTE: Frame gen (r.KuroFI.Enable) is handled in DeviceProfiles CVars only
; NOTE: Locked CVars removed — r.StaticMeshLODDistanceScale, r.DetailMode,
; r.MaterialQualityLevel, r.KuroMaterialQualityLevel, r.Streaming.MinBoost,
; r.MipMapLODBias, r.ViewDistanceScale, r.MobileContentScaleFactor,
; r.SecondaryScreenPercentage have no effect in Engine.ini