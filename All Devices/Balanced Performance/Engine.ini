[SystemSettings]

; =====================================================
; WUTHERING WAVES 3.4
; ALL DEVICES - BALANCED PERFORMANCE
; Target:
; Mali G68/G77/G710/G715
; Xclipse 920
; Goal: Stable 45 FPS
; =====================================================

; ---------------------
; RESOLUTION
; ---------------------

r.ScreenPercentage=80
r.MobileContentScaleFactor=1.0

; ---------------------
; KURO STREAMING
; ---------------------

r.Streaming.UsingNewKuroStreaming=1
r.Streaming.UsingKuroStreamingPriority=3

r.Streaming.PoolSize=512
r.Streaming.MipBias=6

r.Streaming.MaxNumTexturesToStreamPerFrame=2
r.Streaming.FramesForFullUpdate=4

; ---------------------
; LOD / VIEW DISTANCE
; ---------------------

r.ViewDistanceScale=0.8
r.StaticMeshLODDistanceScale=1.0

r.ScreenSizeCullRatioFactor=8

r.SkeletalMeshLODBias=1

; ---------------------
; SHADOWS
; ---------------------

r.ShadowQuality=1

r.Shadow.DistanceScale=0.8

r.Shadow.MaxResolution=256
r.Shadow.MinResolution=256

r.Shadow.PerObjectResolutionMax=256
r.Shadow.PerObjectResolutionMin=256

r.Shadow.CSM.MaxCascades=1

; ---------------------
; FOLIAGE
; ---------------------

foliage.DensityScale=0.5

grass.CullDistanceScale=0.7

foliage.DensityScaleLOD.DrawCallOptimize=1

; ---------------------
; CLOUDS
; ---------------------

r.KuroVolumeCloudEnable=0

; ---------------------
; REFLECTIONS
; ---------------------

r.SSR.Quality=0

; ---------------------
; POST PROCESSING
; ---------------------

r.SceneColorFringeQuality=0
r.BloomQuality=0
r.LensFlareQuality=0

r.EyeAdaptationQuality=1

r.MotionBlurQuality=0

r.Tonemapper.Quality=2

; ---------------------
; AMBIENT OCCLUSION
; ---------------------

r.AmbientOcclusionLevels=0
r.AmbientOcclusionMaxQuality=0

; ---------------------
; EFFECTS
; ---------------------

fx.Niagara.QualityLevel=1
fx.Niagara.GlobalSpawnCountScale=0.8

r.Kuro.InteractionEffect.EnableBushInteractionEffect=0
r.Kuro.InteractionEffect.EnableFoliageEffect=0

; ---------------------
; UPSCALING
; ---------------------

r.Upscale.Quality=3

; ---------------------
; KURO FRAME INTERPOLATION
; ---------------------

r.KuroFI.Enable=1

; ---------------------
; VARIABLE RATE SHADING
; ---------------------

r.VRS.EnableMaterial=false
r.VRS.EnableMesh=false

; ---------------------
; WORLD PARTITION
; ---------------------

wp.Runtime.PlannedLoadingRangeScale=0.5

; ---------------------
; SHADER CACHE
; ---------------------

r.PSO.LRUCapacity=2048

; ---------------------
; ANISOTROPIC FILTERING
; ---------------------

r.MaxAnisotropy=2

