[SystemSettings]

; =====================================================
; WUTHERING WAVES 3.4
; ALL DEVICES - LOW END
; Target:
; Mali G52 / G57
; PowerVR GE8320
; 3GB-6GB RAM Devices
; Goal: Stable 30 FPS
; =====================================================

; ---------------------
; RESOLUTION
; ---------------------

r.ScreenPercentage=65
r.MobileContentScaleFactor=1.0

; ---------------------
; STREAMING
; ---------------------
; Kuro's newer streaming system
; Lower memory usage for newer regions

r.Streaming.UsingNewKuroStreaming=1
r.Streaming.UsingKuroStreamingPriority=3

; Texture memory pool
r.Streaming.PoolSize=256

; Higher value = blurrier textures
; Lower value = sharper textures
r.Streaming.MipBias=12

; Reduce texture streaming spikes
r.Streaming.MaxNumTexturesToStreamPerFrame=1
r.Streaming.FramesForFullUpdate=8

; ---------------------
; LOD / VIEW DISTANCE
; ---------------------

; Lower rendered distance
r.ViewDistanceScale=0.6

; Lower mesh detail sooner
r.StaticMeshLODDistanceScale=1.5

; More aggressive culling
r.ScreenSizeCullRatioFactor=12

; Lower character detail
r.SkeletalMeshLODBias=2

; ---------------------
; SHADOWS
; ---------------------

r.ShadowQuality=0
r.Shadow.DistanceScale=0.5

r.Shadow.MaxResolution=128
r.Shadow.MinResolution=128

r.Shadow.PerObjectResolutionMax=128
r.Shadow.PerObjectResolutionMin=128

r.Shadow.CSM.MaxCascades=1

; ---------------------
; FOLIAGE
; ---------------------

; Disable most grass
foliage.DensityScale=0

; Extra grass culling
grass.CullDistanceScale=0.4

foliage.DensityScaleLOD.DrawCallOptimize=1

; ---------------------
; CLOUDS / FOG
; ---------------------

r.KuroVolumeCloudEnable=0
r.SSFS=0

; ---------------------
; REFLECTIONS
; ---------------------

r.SSR.Quality=0

; ---------------------
; POST PROCESSING
; ---------------------

r.BloomQuality=0
r.LensFlareQuality=0
r.SceneColorFringeQuality=0
r.EyeAdaptationQuality=0
r.MotionBlurQuality=0

; Disable vignette and film grain
r.Tonemapper.Quality=1

; ---------------------
; EFFECTS
; ---------------------

fx.Niagara.QualityLevel=0
fx.Niagara.GlobalSpawnCountScale=0.5

; Disable foliage interaction
r.Kuro.InteractionEffect.EnableBushInteractionEffect=0
r.Kuro.InteractionEffect.EnableFoliageEffect=0

; Disable water ripple effects
r.Kuro.InteractionEffect.UseCppWaterEffect=0

; ---------------------
; UPSCALING
; ---------------------

; Best UI quality
r.Upscale.Quality=3

; ---------------------
; VARIABLE RATE SHADING
; ---------------------

r.VRS.EnableMaterial=false
r.VRS.EnableMesh=false

; ---------------------
; ANIMATION
; ---------------------

a.URO.ForceAnimRate=1

; ---------------------
; WORLD PARTITION
; ---------------------

wp.Runtime.PlannedLoadingRangeScale=0.3

; ---------------------
; SHADER CACHE
; ---------------------

r.PSO.LRUCapacity=1024

