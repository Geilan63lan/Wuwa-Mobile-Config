[/Script/Engine.RendererSettings]
; --- 3.3 ASSET STREAMING ---
r.Streaming.UsingNewKuroStreaming=1
r.streaming.TexturePoolSizeMode=1
r.Streaming.PoolSize=300
r.Streaming.LimitPoolSizeToVRAM=1
r.streaming.QualityExtraLODBiasSetting=975
r.Streaming.MipBias=16
r.LandscapeLODBias=1

; --- SHADOWS ---
r.Shadow.MaxCSMResolution=128
r.Shadow.MinResolution=128
r.Shadow.PerObjectShadowMapResolution=128
r.Shadow.DistanceScale=0.6
r.Shadow.RadiusThreshold=0.06

; --- ANNIVERSARY AREA OPTIMIZATION ---
r.Kuro.Foliage.EnableFoliageCulling=1
grass.CullDistanceScale=0.6
foliage.LODOptimize=1
foliage.DensityScale=0
foliage.DensityType=0

; --- BATCHING & PERFORMANCE ---
HISMBatcher.Enabled=1
r.BBM.EnableBatcher=1
r.BBM.LODBias=2
a.URO.Enable=0

; --- THERMAL & POST PROCESSING ---
r.Kuro.AutoCoolEnable=1
r.Tonemapper.Quality=1
r.DepthOfFieldQuality=0
r.Fog=0
r.SSFS=0

