; ---- DEVICE PROFILE OVERRIDE ----
; Targets low-end Mali / PowerVR / Xclipse / Tegra tiers
dp.override=Android_Mali_G5x_Low
dp.override=Android_Mali_T8xx
dp.override=Android_PowerVR_GE8xxx
dp.override=Android_Xclipse5xx

; ---- SHADOWS ----
r.Shadow.DistanceScale=0.6
r.Shadow.RadiusThreshold=0.06
r.Shadow.MaxCSMResolution=128
r.Shadow.MinResolution=128
r.Shadow.PerObjectShadowMapResolution=128
r.Shadow.PerObjectResolutionMax=128
r.Shadow.PerObjectResolutionMin=128
r.Shadow.ForbidHISMShadowStartIndex=0

; ---- AMBIENT OCCLUSION ----
r.AmbientOcclusionMaxQuality=0

; ---- REFLECTIONS ----
r.SSR.Quality=0

; ---- POST PROCESSING ----
r.SceneColorFringeQuality=0
r.Tonemapper.Quality=1
r.Kuro.KuroBloomStreak=0
r.EnableLensflareSceneSample=0
r.DepthOfFieldQuality=0
r.Kuro.KuroEnableFFTBloom=0

; ---- FOG / CLOUDS ----
r.Fog=0
r.KuroVolumeCloudEnable=0
r.SSFS=0

; ---- FOLIAGE ----
foliage.DensityScale=0
foliage.DensityType=0

; ---- PARTICLES ----
fx.MaxNiagaraCPUParticlesPerEmitter=64
r.ParticleLODBias=1
fx.NiagaraKuroTickUpdateTime=0.5

; ---- STREAMING / TEXTURES ----
; r.Streaming.MinBoost is a locked CVar — removed
; r.MipMapLODBias is a locked CVar — removed
; r.StaticMeshLODDistanceScale is a locked CVar — removed
; r.DetailMode is a locked CVar — removed
; r.MaterialQualityLevel / r.KuroMaterialQualityLevel are locked CVars — removed
r.Streaming.MipBias=16
r.LandscapeLODBias=1

; ---- WORLD PARTITION ----
wp.Runtime.OverrideMultipleRuntimeGridLoadingRangeValues=50&80&180&100&450&1500&150&200&300&150&200&300&480&250&50&80&100&150&40&80&100&100&300&1500&50&80&100&450&600

; ---- WATER / INTERACTION ----
r.Kuro.InteractionEffect.UseCppWaterEffect=0

; ---- ANIMATION ----
a.URO.Enable=0

; ---- HISM BATCHER ----
HISMBatcher.Enabled=1
HISMBatcher.MaxPoolSize=256

; ---- COLOR GRADING ----
r.Color.Max=1.7
r.Color.Mid=0.432
r.Color.Min=0.0001

; ---- THERMAL MANAGEMENT ----
; Enabled — Mali/Exynos devices tend to run hotter
r.Kuro.AutoCoolEnable=1

; ---- MOBILE DEVICE EVALUATION ----
r.Mobile.DeviceEvaluation=3

; NOTE: Frame gen (r.KuroFI.Enable) is handled in DeviceProfiles CVars only
; Works on Vulkan devices, ignored silently on OpenGL ES