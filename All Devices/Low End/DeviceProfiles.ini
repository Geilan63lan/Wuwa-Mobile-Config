; ============================================================
; Wuthering Waves 3.2 - Android Config
; Tier: LOW END - ALL DEVICES
; Targets: Mali, PowerVR, Xclipse, Tegra
; (e.g. Exynos, MediaTek Dimensity, Kirin low-mid, etc.)
; Based on AlteriaX's command set, adapted for Android 3.2
; ============================================================

; ---- BASE PROFILE ----
; AFME CVars removed from DeviceProfiles to match updated 3.2 base file
; All profiles inherit Android_VeryHigh so the game doesn't restrict features
; Engine.ini overrides handle the actual performance tuning

[Android_VeryHigh DeviceProfile]
CVars=r.Mobile.DeviceEvaluation=3
CVars=r.MobileContentScaleFactor=1.0
CVars=r.imp.SSMbScaleLod0=0.0
CVars=r.imp.SSMbScaleLod1=0.0

; ---- DEFAULT FALLBACK ----
[Android_Default DeviceProfile]
BaseProfileName=Android_VeryHigh
DeviceScore=3000

