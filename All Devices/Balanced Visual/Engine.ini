[SystemSettings]

; =====================================================
; WUTHERING WAVES 3.4
; ALL DEVICES - BALANCED VISUAL
; Target:
; Mali G715 / G78
; Xclipse 920 / 940
; Goal: Better Visual Quality
; =====================================================

; ---------------------
; RESOLUTION
; ---------------------

r.ScreenPercentage=100
r.MobileContentScaleFactor=1.0

; ---------------------
; KURO STREAMING
; ---------------------

r.Streaming.UsingNewKuroStreaming=1
r.Streaming.UsingKuroStreamingPriority=3

r.Streaming.PoolSize=768
r.Streaming.MipBias=2

r.Streaming.MaxNumTexturesToStreamPerFrame=3
r.Streaming.FramesForFullUpdate=2

; ---------------------
; LOD / VIEW DISTANCE
; ---------------------

r.ViewDistanceScale=1.0
r.StaticMeshLODDistanceScale=0.8

r.ScreenSizeCullRatioFactor=4

r.SkeletalMeshLODBias=0

; ---------------------
; SHADOWS
; ---------------------

r.ShadowQuality=2

r.Shadow.DistanceScale=1.0

r.Shadow.MaxResolution=512
r.Shadow.MinResolution=512

r.Shadow.PerObjectResolutionMax=512
r.Shadow.PerObjectResolutionMin=512

r.Shadow.CSM.MaxCascades=2

; ---------------------
; FOLIAGE
; ---------------------

foliage.DensityScale=1.0

grass.CullDistanceScale=1.0

foliage.DensityScaleLOD.DrawCallOptimize=1

; ---------------------
; CLOUDS
; ---------------------

r.KuroVolumeCloudEnable=1

; ---------------------
; REFLECTIONS
; ---------------------

r.SSR.Quality=1

; ---------------------
; POST PROCESSING
; ---------------------

r.SceneColorFringeQuality=0

r.BloomQuality=2

r.LensFlareQuality=1

r.EyeAdaptationQuality=2

r.MotionBlurQuality=0

r.Tonemapper.Quality=3

; ---------------------
; AMBIENT OCCLUSION
; ---------------------

r.AmbientOcclusionLevels=1
r.AmbientOcclusionMaxQuality=40

; ---------------------
; EFFECTS
; ---------------------

fx.Niagara.QualityLevel=2
fx.Niagara.GlobalSpawnCountScale=1.0

r.Kuro.InteractionEffect.EnableBushInteractionEffect=1
r.Kuro.InteractionEffect.EnableFoliageEffect=1

; ---------------------
; UPSCALING
; ---------------------

r.Upscale.Quality=3

; ---------------------
; KURO FRAME INTERPOLATION
; ---------------------

r.KuroFI.Enable=1

; ---------------------
; VARIABLE RATE SHADING
; ---------------------

r.VRS.EnableMaterial=true
r.VRS.EnableMesh=true

; ---------------------
; WORLD PARTITION
; ---------------------

wp.Runtime.PlannedLoadingRangeScale=0.8

; ---------------------
; SHADER CACHE
; ---------------------

r.PSO.LRUCapacity=4096

; ---------------------
; ANISOTROPIC FILTERING
; ---------------------

r.MaxAnisotropy=4

