; ============================================================
; Wuthering Waves 3.2 - Android Config
; Tier: BALANCE VISUAL - ALL DEVICES
; Targets: Mali, PowerVR, Xclipse, Tegra
; (e.g. Exynos 2200/2300/2400, Dimensity 9000/9200/9300, Kirin 9xx)
; Based on AlteriaX's command set, adapted for Android 3.2
; ============================================================

; ---- BASE PROFILE ----
; r.MobileContentScaleFactor=1.0 — native res (not 1.5 like Snapdragon visual tier)
; r.KuroFI.Enable=1 set here in DeviceProfiles — NOT in Engine.ini
; Works on Vulkan devices, ignored silently on OpenGL ES
; AFME removed — replaced by KuroFI
; r.SecondaryScreenPercentage kept — present in this tier's base file

[Android_VeryHigh DeviceProfile]
CVars=r.MobileContentScaleFactor=1.0
CVars=r.SecondaryScreenPercentage.GameViewport=100
CVars=r.imp.SSMbScaleLod0=0.0
CVars=r.imp.SSMbScaleLod1=0.0
CVars=r.KuroFI.Enable=1
CVars=r.Mobile.DeviceEvaluation=3

[Android_Default DeviceProfile]
BaseProfileName=Android_VeryHigh
DeviceScore=3000

